<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reels by Vi | Content Creator</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{

font-family:'Outfit',sans-serif;
background:#fff;
color:#222;
line-height:1.7;

}

.container{

width:90%;
max-width:1200px;
margin:auto;

}

/* =======================
HEADER
======================= */

header{

position:fixed;
top:0;
left:0;
width:100%;
background:#111;
padding:22px 0;
z-index:999;

}

nav{

display:flex;
justify-content:space-between;
align-items:center;

}

.logo{

font-size:30px;
font-weight:800;
color:#fff;
letter-spacing:1px;

}

.logo span{

color:#e63946;

}

nav ul{

display:flex;
list-style:none;
gap:35px;

}

nav a{

color:white;
text-decoration:none;
font-weight:500;
transition:.3s;

}

nav a:hover{

color:#e63946;

}


/* =======================
Hero
======================= */

.hero{

padding-top:170px;
padding-bottom:120px;

}

.hero-content{

display:grid;
grid-template-columns:1fr 1fr;
align-items:center;
gap:80px;

}

.hero h1{

font-size:62px;
line-height:1.1;
margin-bottom:25px;

}

.hero h1 span{

color:#e63946;

}

.hero p{

font-size:20px;
color:#666;
margin-bottom:40px;

}

.btn{

display:inline-block;
padding:17px 40px;
background:#e63946;
color:white;
border-radius:50px;
text-decoration:none;
font-weight:600;
transition:.35s;

}

.btn:hover{

background:#111;
transform:translateY(-5px);

}

.hero img{

width:100%;
border-radius:30px;
box-shadow:0 20px 50px rgba(0,0,0,.18);

}


/* =======================
About
======================= */

.about{

padding:120px 0;

}

.about-grid{

display:grid;
grid-template-columns:420px 1fr;
gap:70px;
align-items:center;

}

.about img{

width:100%;
border-radius:25px;

}

.section-title{

font-size:42px;
margin-bottom:25px;

}

.section-title span{

color:#e63946;

}

.about p{

font-size:18px;
color:#666;
margin-bottom:18px;

}

.info{

display:flex;
gap:20px;
margin-top:35px;
flex-wrap:wrap;

}

.box{

background:#fafafa;
padding:20px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,.05);
flex:1;
min-width:170px;

}

.box h3{

color:#e63946;
font-size:28px;

}

/* =======================
Portfolio
======================= */

.portfolio{

padding:120px 0;
background:#fafafa;

}

.cards{

display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;
margin-top:60px;

}

.card{

background:white;
border-radius:25px;
overflow:hidden;
transition:.4s;
box-shadow:0 15px 35px rgba(0,0,0,.08);

}

.card:hover{

transform:translateY(-10px);

}

.card img{

width:100%;
height:250px;
object-fit:cover;

}

.card-content{

padding:25px;

}

.card h3{

margin-bottom:12px;

}

.card p{

color:#666;

}

.tag{

display:inline-block;
margin-top:18px;
padding:8px 18px;
border-radius:40px;
background:#e63946;
color:white;
font-size:14px;

}

/* =======================
Services
======================= */

.services{

padding:120px 0;

}

.service-grid{

display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;
margin-top:60px;

}

.service{

padding:40px;
background:white;
border-radius:25px;
box-shadow:0 15px 35px rgba(0,0,0,.08);
transition:.35s;

}

.service:hover{

background:#e63946;
color:white;
transform:translateY(-8px);

}

.service:hover p{

color:white;

}

.service h3{

margin-bottom:15px;

}

.service p{

color:#666;

}

.service i{

font-size:40px;
margin-bottom:20px;

}
